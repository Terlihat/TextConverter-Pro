<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Converter Pro v7.0 - Ultimate Edition</title>
    <meta name="theme-color" content="#0f172a">
    <link rel="manifest" href="data:application/json;base64,ewogICJnameIjogIlRleHQgQ29udmVydGVyIFBybyIsCiAgInNob3J0X25hbWUiOiAiVGV4dENvbnYiLAogICJzdGFydF91cmwiOiAiLiIsCiAgImRpc3BsYXkiOiAic3RhbmRhbG9uZSIsCiAgImJhY2tncm91bmRfY29sb3IiOiAiIzBmMTcyYSIsCiAgInRoZW1lX2NvbG9yIjogIiMzYjgyZjYiCn0=">

    <style>
        :root {
            --bg-color: #0f172a;
            --container-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --border-color: #334155;
            --btn-bg: #1e293b;
            --btn-special: #f59e0b;
            --btn-dev: #10b981;
            --btn-extract: #ec4899;
        }

        [data-theme="light"] {
            --bg-color: #f1f5f9;
            --container-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --border-color: #cbd5e1;
            --btn-bg: #f8fafc;
            --btn-special: #d97706;
            --btn-dev: #059669;
            --btn-extract: #db2777;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top right, rgba(236, 72, 153, 0.1), transparent);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        .container {
            background-color: var(--container-bg);
            width: 100%;
            max-width: 1000px;
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
        }

        .header-wrap {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        h1 {
            margin: 0;
            background: linear-gradient(135deg, #3b82f6, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2rem;
            font-weight: 800;
        }

        .icon-btn {
            background: var(--btn-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 8px 15px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.3s;
            font-weight: 600;
        }

        .icon-btn:hover { background-color: var(--border-color); }

        textarea {
            width: 100%;
            height: 220px;
            background-color: rgba(15, 23, 42, 0.3);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            font-size: 1.05rem;
            resize: vertical;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
            line-height: 1.6;
            font-family: monospace;
        }

        textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }

        .stats {
            display: flex;
            justify-content: flex-start;
            gap: 20px;
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
            margin-top: 10px;
        }

        .category-container { margin-top: 25px; }

        .category-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .category-title::after { content: ""; flex: 1; height: 1px; background: var(--border-color); }

        .button-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
        }

        button.tool-btn {
            background-color: var(--btn-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: 0.2s;
        }

        button.tool-btn:hover {
            background-color: var(--accent);
            border-color: var(--accent);
            color: white;
            transform: translateY(-2px);
        }

        .extract-btn { border-color: var(--btn-extract) !important; color: var(--btn-extract) !important; }
        .extract-btn:hover { background: var(--btn-extract) !important; color: white !important; }
        
        .special-btn { border-color: var(--btn-special) !important; color: var(--btn-special) !important; }
        .special-btn:hover { background: var(--btn-special) !important; color: white !important; }

        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid var(--border-color);
        }

        .btn-main { padding: 15px 25px; border-radius: 14px; font-weight: 700; flex: 1; border: none; cursor: pointer; transition: 0.3s; }
        .btn-copy { background: var(--accent); color: white; }
        .btn-copy:hover { background: var(--accent-hover); }
        .btn-clear { background: #ef4444; color: white; flex: 0.3; }

        @media (max-width: 768px) {
            .button-grid { grid-template-columns: 1fr 1fr; }
            .action-buttons { flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-wrap">
        <h1>Text Converter <span style="font-size: 1rem; color: var(--text-muted);">v7.0</span></h1>
        <button class="icon-btn" onclick="toggleTheme()" id="themeToggle">☀️ Light Mode</button>
    </div>
    
    <textarea id="inputText" placeholder="Ketik, tempel teks, atau letakkan data berantakan Anda di sini..."></textarea>
    
    <div class="stats">
        <span id="charCount">0 Karakter</span>
        <span id="wordCount">0 Kata</span>
    </div>

    <div class="category-container">
        <div class="category-title">🕵️‍♂️ Data Extractor (Penyedot Data)</div>
        <div class="button-grid">
            <button class="tool-btn extract-btn" onclick="processText('extLinks')">🔗 Ekstrak Link</button>
            <button class="tool-btn extract-btn" onclick="processText('extEmails')">📧 Ekstrak Email</button>
            <button class="tool-btn extract-btn" onclick="processText('extHashtags')">#️⃣ Ekstrak Hashtag</button>
            <button class="tool-btn extract-btn" onclick="processText('extNumbers')">🔢 Ekstrak Angka</button>
        </div>
    </div>

    <div class="category-container">
        <div class="category-title">🌍 Terjemahan (Translate API)</div>
        <div class="button-grid">
            <button class="tool-btn special-btn" id="btnTransIDEN" onclick="translateText('id|en')">🇮🇩 ID ➔ 🇬🇧 EN</button>
            <button class="tool-btn special-btn" id="btnTransENID" onclick="translateText('en|id')">🇬🇧 EN ➔ 🇮🇩 ID</button>
        </div>
    </div>

    <div class="category-container">
        <div class="category-title">📝 Format Dasar & Developer</div>
        <div class="button-grid">
            <button class="tool-btn" onclick="processText('upper')">UPPERCASE</button>
            <button class="tool-btn" onclick="processText('lower')">lowercase</button>
            <button class="tool-btn" onclick="processText('title')">Title Case</button>
            <button class="tool-btn" onclick="processText('clean')">🧹 Hapus Spasi</button>
            <button class="tool-btn" onclick="processText('jsonFormat')">{} JSON Format</button>
            <button class="tool-btn" onclick="processText('base64')">Base64 Enc/Dec</button>
        </div>
    </div>

    <div class="action-buttons">
        <button class="btn-main btn-copy" onclick="copy()">📋 Salin Teks</button>
        <button class="btn-main btn-clear" onclick="clearAll()">🗑️ Kosongkan</button>
    </div>
</div>

<script>
    const input = document.getElementById('inputText');
    const themeBtn = document.getElementById('themeToggle');

    // Update Stats
    input.addEventListener('input', updateStats);
    
    function updateStats() {
        const val = input.value;
        document.getElementById('charCount').innerText = `${val.length} Karakter`;
        document.getElementById('wordCount').innerText = `${val.trim() ? val.trim().split(/\s+/).length : 0} Kata`;
    }

    // Theme Toggle
    function toggleTheme() {
        const root = document.documentElement;
        if (root.getAttribute('data-theme') === 'light') {
            root.removeAttribute('data-theme');
            themeBtn.innerText = '☀️ Light Mode';
        } else {
            root.setAttribute('data-theme', 'light');
            themeBtn.innerText = '🌙 Dark Mode';
        }
    }

    // Live Translator via MyMemory API
    async function translateText(langPair) {
        const txt = input.value.trim();
        if(!txt) return;
        
        const btnId = langPair === 'id|en' ? 'btnTransIDEN' : 'btnTransENID';
        const btn = document.getElementById(btnId);
        const originalText = btn.innerText;
        
        btn.innerText = "⏳ Menerjemahkan...";
        btn.disabled = true;

        try {
            // Memanggil API gratis MyMemory
            const response = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(txt)}&langpair=${langPair}`);
            const data = await response.json();
            
            if(data.responseData && data.responseData.translatedText) {
                input.value = data.responseData.translatedText;
                updateStats();
            } else {
                alert("Gagal mendapatkan terjemahan dari server.");
            }
        } catch (error) {
            alert("Terjadi kesalahan. Pastikan perangkat Anda terhubung ke internet.");
        }

        btn.innerText = originalText;
        btn.disabled = false;
    }

    // Main Processing (Extractor & Formatter)
    function processText(type) {
        let txt = input.value;
        if (!txt) return;

        try {
            switch(type) {
                case 'upper': txt = txt.toUpperCase(); break;
                case 'lower': txt = txt.toLowerCase(); break;
                case 'title': txt = txt.replace(/\w\S*/g, (w) => w.replace(/^\w/, (c) => c.toUpperCase())); break;
                case 'clean': txt = txt.replace(/\s+/g, ' ').trim(); break;
                case 'jsonFormat': txt = JSON.stringify(JSON.parse(txt), null, 4); break;
                case 'base64': 
                    try { txt = (txt === btoa(atob(txt))) ? atob(txt) : btoa(txt); } 
                    catch(e) { txt = btoa(txt); } 
                    break;
                
                // Extractors
                case 'extLinks':
                    const links = txt.match(/https?:\/\/[^\s]+/gi);
                    txt = links ? [...new Set(links)].join('\n') : "Tidak ada link (http/https) yang ditemukan.";
                    break;
                case 'extEmails':
                    const emails = txt.match(/([a-zA-Z0-9._-]+@[a-zA-Z0-9._-]+\.[a-zA-Z0-9_-]+)/gi);
                    txt = emails ? [...new Set(emails)].join('\n') : "Tidak ada alamat email yang ditemukan.";
                    break;
                case 'extHashtags':
                    const hashtags = txt.match(/#[a-zA-Z0-9_]+/gi);
                    txt = hashtags ? [...new Set(hashtags)].join('\n') : "Tidak ada hashtag yang ditemukan.";
                    break;
                case 'extNumbers':
                    const numbers = txt.match(/\d+/g);
                    txt = numbers ? numbers.join('\n') : "Tidak ada angka yang ditemukan.";
                    break;
            }
            input.value = txt;
            updateStats();
        } catch (e) {
            alert("Operasi gagal. Pastikan format input Anda benar.");
        }
    }

    function copy() {
        if (!input.value) return;
        input.select();
        document.execCommand('copy');
        const btn = document.querySelector('.btn-copy');
        btn.innerText = "✅ Tersalin!";
        setTimeout(() => btn.innerText = "📋 Salin Teks", 2000);
    }

    function clearAll() {
        input.value = "";
        updateStats();
    }
</script>

</body>
</html>
