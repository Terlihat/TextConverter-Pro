<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Text Converter v2.0</title>
    <style>
        :root {
            /* Tema Gelap (Default) */
            --bg-color: #0f172a;
            --container-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --border-color: #334155;
            --btn-bg: #1e293b;
        }

        [data-theme="light"] {
            /* Tema Terang */
            --bg-color: #f1f5f9;
            --container-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --border-color: #cbd5e1;
            --btn-bg: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .container {
            background-color: var(--container-bg);
            width: 100%;
            max-width: 800px;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--border-color);
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        .header-wrap {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        h1 {
            margin: 0;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.2rem;
        }

        .theme-toggle {
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 8px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all 0.3s ease;
        }

        .theme-toggle:hover {
            background-color: var(--border-color);
        }

        textarea {
            width: 100%;
            height: 180px;
            background-color: var(--bg-color);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 15px;
            font-size: 1rem;
            resize: vertical;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s ease, background-color 0.3s ease, color 0.3s ease;
        }

        textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        .stats {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 8px;
            margin-bottom: 20px;
        }

        .button-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }

        button {
            background-color: var(--btn-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 12px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        button:hover {
            background-color: var(--accent);
            border-color: var(--accent);
            color: #ffffff;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
            margin-top: 10px;
        }

        .btn-copy { background-color: #10b981; border-color: #10b981; color: white;}
        .btn-copy:hover { background-color: #059669; border-color: #059669; }
        
        .btn-clear { background-color: #ef4444; border-color: #ef4444; color: white;}
        .btn-clear:hover { background-color: #dc2626; border-color: #dc2626; }

    </style>
</head>
<body>

<div class="container">
    <div class="header-wrap">
        <h1>Text Converter Pro <span style="font-size: 1rem; color: var(--text-muted);">- v2.0</span></h1>
        <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">☀️ Light Mode</button>
    </div>
    
    <textarea id="inputText" placeholder="Ketik atau paste teks Anda di sini..."></textarea>
    
    <div class="stats">
        <span id="charCount">Karakter: 0</span>
        <span id="wordCount">Kata: 0</span>
    </div>

    <div class="button-grid">
        <button onclick="convertText('upper')">UPPERCASE</button>
        <button onclick="convertText('lower')">lowercase</button>
        <button onclick="convertText('title')">Title Case</button>
        <button onclick="convertText('sentence')">Sentence case</button>
        <button onclick="convertText('reverse')">esreveR</button>
        <button onclick="convertText('base64Encode')">Base64 Encode</button>
        <button onclick="convertText('base64Decode')">Base64 Decode</button>
        <button onclick="convertText('binaryEncode')">Text to Binary</button>
        <button onclick="convertText('binaryDecode')">Binary to Text</button>
    </div>

    <div class="action-buttons">
        <button class="btn-copy" onclick="copyText()">📋 Salin Teks</button>
        <button class="btn-clear" onclick="clearText()">🗑️ Hapus</button>
    </div>
</div>

<script>
    const inputEl = document.getElementById('inputText');
    const charCountEl = document.getElementById('charCount');
    const wordCountEl = document.getElementById('wordCount');
    const themeToggleBtn = document.getElementById('themeToggle');

    // Update stats in real-time
    inputEl.addEventListener('input', () => {
        const text = inputEl.value;
        charCountEl.innerText = `Karakter: ${text.length}`;
        const words = text.trim() === '' ? 0 : text.trim().split(/\s+/).length;
        wordCountEl.innerText = `Kata: ${words}`;
    });

    // Theme Toggle Logic
    function toggleTheme() {
        const body = document.documentElement;
        if (body.getAttribute('data-theme') === 'light') {
            body.removeAttribute('data-theme');
            themeToggleBtn.innerText = '☀️ Light Mode';
        } else {
            body.setAttribute('data-theme', 'light');
            themeToggleBtn.innerText = '🌙 Dark Mode';
        }
    }

    // Text Conversion Logic
    function convertText(type) {
        let text = inputEl.value;
        if (!text) return;

        switch(type) {
            case 'upper':
                text = text.toUpperCase();
                break;
            case 'lower':
                text = text.toLowerCase();
                break;
            case 'title':
                text = text.toLowerCase().split(' ').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
                break;
            case 'sentence':
                text = text.toLowerCase().replace(/(^\s*\w|[\.\!\?]\s*\w)/g, c => c.toUpperCase());
                break;
            case 'reverse':
                text = text.split('').reverse().join('');
                break;
            case 'base64Encode':
                try { text = btoa(text); } catch(e) { alert("Teks tidak dapat di-encode ke Base64 (hindari karakter non-latin khusus tanpa formatting yang tepat)."); }
                break;
            case 'base64Decode':
                try { text = atob(text); } catch(e) { alert("Format Base64 tidak valid."); }
                break;
            case 'binaryEncode':
                text = text.split('').map(char => {
                    return char.charCodeAt(0).toString(2).padStart(8, '0');
                }).join(' ');
                break;
            case 'binaryDecode':
                try {
                    // Membersihkan spasi berlebih
                    const binaryArr = text.trim().split(/\s+/);
                    text = binaryArr.map(bin => {
                        if(!/^[01]+$/.test(bin)) throw new Error("Not Binary");
                        return String.fromCharCode(parseInt(bin, 2));
                    }).join('');
                } catch(e) { 
                    alert("Format biner tidak valid. Pastikan hanya berisi angka 0 dan 1 yang dipisahkan spasi."); 
                }
                break;
        }
        
        inputEl.value = text;
        inputEl.dispatchEvent(new Event('input')); // trigger stat update
    }

    // Copy to Clipboard
    function copyText() {
        if (!inputEl.value) return;
        inputEl.select();
        document.execCommand('copy');
        
        // Simple visual feedback
        const btn = document.querySelector('.btn-copy');
        const originalText = btn.innerHTML;
        btn.innerHTML = '✅ Tersalin!';
        setTimeout(() => btn.innerHTML = originalText, 2000);
    }

    // Clear Textarea
    function clearText() {
        inputEl.value = '';
        inputEl.dispatchEvent(new Event('input'));
    }
</script>

</body>
</html>
