<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Converter Pro v6.0 - Developer Edition</title>
    <meta name="theme-color" content="#0f172a">
    <meta name="description" content="Aplikasi konversi teks profesional terlengkap dengan fitur Developer.">
    <link rel="manifest" href="data:application/json;base64,ewogICJnameIjogIlRleHQgQ29udmVydGVyIFBybyIsCiAgInNob3J0X25hbWUiOiAiVGV4dENvbnYiLAogICJzdGFydF91cmwiOiAiLiIsCiAgImRpc3BsYXkiOiAic3RhbmRhbG9uZSIsCiAgImJhY2tncm91bmRfY29sb3IiOiAiIzBmMTcyYSIsCiAgInRoZW1lX2NvbG9yIjogIiMzYjgyZjYiCn0=">

    <style>
        :root {
            --bg-color: #0f172a;
            --container-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --border-color: #334155;
            --btn-bg: #1e293b;
            --btn-special: #8b5cf6;
            --btn-dev: #10b981;
            --btn-download: #f59e0b;
            --diff-add: rgba(16, 185, 129, 0.2);
            --diff-remove: rgba(239, 68, 68, 0.2);
        }

        [data-theme="light"] {
            --bg-color: #f1f5f9;
            --container-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --border-color: #cbd5e1;
            --btn-bg: #f8fafc;
            --btn-special: #a855f7;
            --btn-dev: #059669;
            --btn-download: #d97706;
            --diff-add: rgba(16, 185, 129, 0.3);
            --diff-remove: rgba(239, 68, 68, 0.3);
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top left, rgba(139, 92, 246, 0.1), transparent);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        .container {
            background-color: var(--container-bg);
            width: 100%;
            max-width: 1000px;
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
        }

        .header-wrap {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        h1 {
            margin: 0;
            background: linear-gradient(135deg, #3b82f6, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2rem;
            font-weight: 800;
        }

        .top-controls { display: flex; gap: 10px; }

        .icon-btn {
            background: var(--btn-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 8px 15px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.3s;
            font-weight: 600;
        }

        .icon-btn:hover { background-color: var(--border-color); }

        .editor-container {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
        }

        .editor-box {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .editor-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 5px;
            font-weight: 600;
            display: none;
        }

        textarea {
            width: 100%;
            height: 220px;
            background-color: rgba(15, 23, 42, 0.3);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            font-size: 1.05rem;
            resize: vertical;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
            line-height: 1.6;
            font-family: monospace;
        }

        textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }

        #diffOutput {
            width: 100%;
            height: 220px;
            background-color: rgba(15, 23, 42, 0.3);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            overflow-y: auto;
            font-family: monospace;
            white-space: pre-wrap;
            display: none;
            font-size: 1.05rem;
            line-height: 1.6;
        }

        .diff-added { background-color: var(--diff-add); text-decoration: none; }
        .diff-removed { background-color: var(--diff-remove); text-decoration: line-through; opacity: 0.7;}

        .stats {
            display: flex;
            justify-content: flex-start;
            gap: 20px;
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .category-container { margin-top: 25px; }

        .category-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .category-title::after { content: ""; flex: 1; height: 1px; background: var(--border-color); }

        .button-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
        }

        button.tool-btn {
            background-color: var(--btn-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: 0.2s;
        }

        button.tool-btn:hover {
            background-color: var(--accent);
            border-color: var(--accent);
            color: white;
            transform: translateY(-2px);
        }

        .dev-btn { border-color: var(--btn-dev) !important; color: var(--btn-dev) !important; }
        .dev-btn:hover { background: var(--btn-dev) !important; color: white !important; }

        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid var(--border-color);
        }

        .btn-main { padding: 15px 25px; border-radius: 14px; font-weight: 700; flex: 1; border: none; cursor: pointer; transition: 0.3s; }
        .btn-copy { background: var(--accent); color: white; }
        .btn-copy:hover { background: var(--accent-hover); }
        .btn-clear { background: #ef4444; color: white; flex: 0.3; }

        /* Compare Mode Adjustments */
        body.compare-mode .editor-box:nth-child(2) { display: flex; }
        body.compare-mode .editor-label { display: block; }
        body.compare-mode #inputText { height: 150px; }
        body.compare-mode #inputText2 { height: 150px; }

        @media (max-width: 768px) {
            .button-grid { grid-template-columns: 1fr 1fr; }
            .header-wrap { flex-direction: column; align-items: flex-start; gap: 15px;}
            .editor-container { flex-direction: column; }
            .action-buttons { flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-wrap">
        <h1>Text Converter <span style="font-size: 1rem; color: var(--text-muted);">v6.0</span></h1>
        <div class="top-controls">
            <button class="icon-btn" id="compareBtn" onclick="toggleCompare()">⚖️ Compare Mode</button>
            <button class="icon-btn" onclick="toggleTheme()" id="themeToggle">☀️ Light</button>
        </div>
    </div>
    
    <div class="editor-container">
        <div class="editor-box">
            <span class="editor-label">Teks Asli (Original)</span>
            <textarea id="inputText" placeholder="Ketik atau paste teks Anda di sini..."></textarea>
        </div>
        <div class="editor-box" id="box2" style="display: none;">
            <span class="editor-label">Teks Baru (Revisi)</span>
            <textarea id="inputText2" placeholder="Paste teks pembanding di sini..."></textarea>
        </div>
    </div>
    
    <div id="diffOutput"></div>

    <div class="stats">
        <span id="charCount">0 Karakter</span>
        <span id="wordCount">0 Kata</span>
    </div>

    <div class="category-container" id="devTools">
        <div class="category-title">💻 Developer Tools</div>
        <div class="button-grid">
            <button class="tool-btn dev-btn" onclick="processText('jsonFormat')">{} JSON Format</button>
            <button class="tool-btn dev-btn" onclick="processText('jsonMinify')">{} JSON Minify</button>
            <button class="tool-btn dev-btn" onclick="processText('urlEncode')">🌐 URL Encode</button>
            <button class="tool-btn dev-btn" onclick="processText('urlDecode')">🌐 URL Decode</button>
            <button class="tool-btn dev-btn" id="btnRunCompare" onclick="runCompare()" style="display: none; background: var(--btn-dev); color: white;">⚖️ Jalankan Compare</button>
        </div>
    </div>

    <div class="category-container">
        <div class="category-title">📝 Format & Keamanan</div>
        <div class="button-grid">
            <button class="tool-btn" onclick="processText('upper')">UPPERCASE</button>
            <button class="tool-btn" onclick="processText('lower')">lowercase</button>
            <button class="tool-btn" onclick="processText('title')">Title Case</button>
            <button class="tool-btn" onclick="processText('base64')">Base64 Encode/Decode</button>
        </div>
    </div>

    <div class="action-buttons">
        <button class="btn-main btn-copy" onclick="copy()">📋 Salin Teks</button>
        <button class="btn-main btn-clear" onclick="clearAll()">🗑️ Kosongkan</button>
    </div>
</div>

<script>
    const input1 = document.getElementById('inputText');
    const input2 = document.getElementById('inputText2');
    const diffOutput = document.getElementById('diffOutput');
    const themeBtn = document.getElementById('themeToggle');
    let isCompareMode = false;

    // Update Stats
    input1.addEventListener('input', updateStats);
    
    function updateStats() {
        const val = input1.value;
        document.getElementById('charCount').innerText = `${val.length} Karakter`;
        document.getElementById('wordCount').innerText = `${val.trim() ? val.trim().split(/\s+/).length : 0} Kata`;
    }

    // Theme Toggle
    function toggleTheme() {
        const root = document.documentElement;
        if (root.getAttribute('data-theme') === 'light') {
            root.removeAttribute('data-theme');
            themeBtn.innerText = '☀️ Light';
        } else {
            root.setAttribute('data-theme', 'light');
            themeBtn.innerText = '🌙 Dark';
        }
    }

    // Toggle Compare Mode
    function toggleCompare() {
        isCompareMode = !isCompareMode;
        if(isCompareMode) {
            document.body.classList.add('compare-mode');
            document.getElementById('compareBtn').innerText = "❌ Tutup Compare";
            document.getElementById('btnRunCompare').style.display = 'block';
            diffOutput.style.display = 'none';
        } else {
            document.body.classList.remove('compare-mode');
            document.getElementById('compareBtn').innerText = "⚖️ Compare Mode";
            document.getElementById('btnRunCompare').style.display = 'none';
            diffOutput.style.display = 'none';
            input1.style.display = 'block';
        }
    }

    // Simple Line/Word Diff Algorithm
    function runCompare() {
        input1.style.display = 'none';
        document.getElementById('box2').style.display = 'none';
        diffOutput.style.display = 'block';

        const text1 = input1.value.split('\n');
        const text2 = input2.value.split('\n');
        let resultHTML = "";

        const maxLength = Math.max(text1.length, text2.length);
        for(let i=0; i<maxLength; i++) {
            const line1 = text1[i] || "";
            const line2 = text2[i] || "";

            if(line1 === line2) {
                resultHTML += `<div>${escapeHTML(line1)}</div>`;
            } else {
                if(line1) resultHTML += `<div class="diff-removed">- ${escapeHTML(line1)}</div>`;
                if(line2) resultHTML += `<div class="diff-added">+ ${escapeHTML(line2)}</div>`;
            }
        }
        diffOutput.innerHTML = resultHTML || "<em>Tidak ada teks untuk dibandingkan.</em>";
        document.getElementById('compareBtn').innerText = "🔙 Kembali ke Editor";
    }

    function escapeHTML(str) {
        return str.replace(/[&<>'"]/g, tag => ({
            '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
        }[tag] || tag));
    }

    // Main Processing
    function processText(type) {
        let txt = input1.value;
        if (!txt) return;

        try {
            switch(type) {
                case 'upper': txt = txt.toUpperCase(); break;
                case 'lower': txt = txt.toLowerCase(); break;
                case 'title': txt = txt.replace(/\w\S*/g, (w) => w.replace(/^\w/, (c) => c.toUpperCase())); break;
                case 'jsonFormat': txt = JSON.stringify(JSON.parse(txt), null, 4); break;
                case 'jsonMinify': txt = JSON.stringify(JSON.parse(txt)); break;
                case 'urlEncode': txt = encodeURIComponent(txt); break;
                case 'urlDecode': txt = decodeURIComponent(txt); break;
                case 'base64': 
                    try { txt = (txt === btoa(atob(txt))) ? atob(txt) : btoa(txt); } 
                    catch(e) { txt = btoa(txt); } 
                    break;
            }
            input1.value = txt;
            updateStats();
        } catch (e) {
            alert("Operasi gagal. Pastikan format teks Anda benar (contoh: format JSON harus valid).");
        }
    }

    function copy() {
        if(isCompareMode && diffOutput.style.display === 'block') {
            navigator.clipboard.writeText(diffOutput.innerText);
        } else {
            input1.select();
            document.execCommand('copy');
        }
        const btn = document.querySelector('.btn-copy');
        btn.innerText = "✅ Tersalin!";
        setTimeout(() => btn.innerText = "📋 Salin Teks", 2000);
    }

    function clearAll() {
        input1.value = "";
        input2.value = "";
        diffOutput.innerHTML = "";
        updateStats();
        if(isCompareMode && diffOutput.style.display === 'block') {
            toggleCompare(); // Reset compare mode
        }
    }
</script>

</body>
</html>
