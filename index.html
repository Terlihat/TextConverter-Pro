<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Converter Pro v5.0 - PWA Edition</title>
    <meta name="theme-color" content="#0f172a">
    <meta name="description" content="Aplikasi konversi teks profesional terlengkap.">
    <link rel="manifest" href="data:application/json;base64,ewogICJnameIjogIlRleHQgQ29udmVydGVyIFBybyIsCiAgInNob3J0X25hbWUiOiAiVGV4dENvbnYiLAogICJzdGFydF91cmwiOiAiLiIsCiAgImRpc3BsYXkiOiAic3RhbmRhbG9uZSIsCiAgImJhY2tncm91bmRfY29sb3IiOiAiIzBmMTcyYSIsCiAgInRoZW1lX2NvbG9yIjogIiMzYjgyZjYiCn0=">

    <style>
        :root {
            /* Tema Gelap (Default) */
            --bg-color: #0f172a;
            --container-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --border-color: #334155;
            --btn-bg: #1e293b;
            --btn-special: #8b5cf6;
            --btn-download: #f59e0b;
        }

        [data-theme="light"] {
            /* Tema Terang */
            --bg-color: #f1f5f9;
            --container-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --border-color: #cbd5e1;
            --btn-bg: #f8fafc;
            --btn-special: #a855f7;
            --btn-download: #d97706;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top right, rgba(59, 130, 246, 0.1), transparent);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        .container {
            background-color: var(--container-bg);
            width: 100%;
            max-width: 900px;
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
            position: relative;
        }

        .header-wrap {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        h1 {
            margin: 0;
            background: linear-gradient(135deg, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2rem;
            font-weight: 800;
        }

        .top-controls {
            display: flex;
            gap: 10px;
        }

        .icon-btn {
            background: var(--btn-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 10px 15px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }

        .icon-btn:hover { background-color: var(--border-color); }

        textarea {
            width: 100%;
            height: 220px;
            background-color: rgba(15, 23, 42, 0.5);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            font-size: 1.05rem;
            resize: vertical;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
            line-height: 1.6;
        }

        textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }

        .stats {
            display: flex;
            justify-content: flex-start;
            gap: 20px;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 10px;
            font-weight: 500;
        }

        .category-container {
            margin-top: 25px;
        }

        .category-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .category-title::after { content: ""; flex: 1; height: 1px; background: var(--border-color); }

        .button-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 10px;
        }

        button.tool-btn {
            background-color: var(--btn-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: 0.2s;
            text-align: center;
        }

        button.tool-btn:hover {
            background-color: var(--accent);
            border-color: var(--accent);
            color: white;
            transform: translateY(-2px);
        }

        .special-btn { border-color: var(--btn-special) !important; color: var(--btn-special) !important; }
        .special-btn:hover { background: var(--btn-special) !important; color: white !important; }

        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid var(--border-color);
        }

        .btn-main { padding: 15px 25px; border-radius: 14px; font-weight: 700; flex: 1; border: none; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-copy { background: var(--accent); color: white; }
        .btn-copy:hover { background: var(--accent-hover); box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.3); }
        
        .btn-download { background: var(--btn-download); color: white; }
        .btn-clear { background: #ef4444; color: white; flex: 0.3; }

        /* Mobile Responsive */
        @media (max-width: 600px) {
            .button-grid { grid-template-columns: 1fr 1fr; }
            .header-wrap { flex-direction: column; gap: 15px; align-items: flex-start; }
            .action-buttons { flex-direction: column; }
            .btn-clear { flex: 1; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-wrap">
        <h1>Text Converter Pro <span style="font-size: 0.9rem; opacity: 0.6;">v5.0</span></h1>
        <div class="top-controls">
            <button class="icon-btn" id="installBtn" style="display:none;" onclick="installPWA()">📲 Install</button>
            <button class="icon-btn" onclick="toggleTheme()" id="themeToggle">☀️ Light</button>
        </div>
    </div>
    
    <textarea id="inputText" placeholder="Mulai mengetik atau tempel teks di sini..."></textarea>
    
    <div class="stats">
        <span id="charCount">0 Karakter</span>
        <span id="wordCount">0 Kata</span>
        <span id="lineCount">0 Baris</span>
    </div>

    <div class="category-container">
        <div class="category-title">Format Huruf</div>
        <div class="button-grid">
            <button class="tool-btn" onclick="processText('upper')">UPPERCASE</button>
            <button class="tool-btn" onclick="processText('lower')">lowercase</button>
            <button class="tool-btn" onclick="processText('title')">Title Case</button>
            <button class="tool-btn" onclick="processText('sentence')">Sentence Case</button>
        </div>
    </div>

    <div class="category-container">
        <div class="category-title">Keamanan & Kode</div>
        <div class="button-grid">
            <button class="tool-btn special-btn" onclick="processText('base64')">Base64 Encode/Decode</button>
            <button class="tool-btn special-btn" onclick="processText('binary')">Binary Encode/Decode</button>
            <button class="tool-btn special-btn" onclick="processText('caesar')">Caesar Cipher</button>
            <button class="tool-btn special-btn" onclick="generatePass()">🔑 Gen Password</button>
        </div>
    </div>

    <div class="category-container">
        <div class="category-title">Utilitas & Konten</div>
        <div class="button-grid">
            <button class="tool-btn" onclick="processText('clean')">🧹 Bersihkan Spasi</button>
            <button class="tool-btn" onclick="processText('slug')">🔗 URL Slug</button>
            <button class="tool-btn" onclick="loremIpsum()">📝 Lorem Ipsum</button>
            <button class="tool-btn" onclick="processText('extractEmails')">📧 Ambil Email</button>
            <button class="tool-btn" onclick="speak()">🔊 Baca Teks</button>
        </div>
    </div>

    <div class="action-buttons">
        <button class="btn-main btn-copy" onclick="copy()">📋 Salin Teks</button>
        <button class="btn-main btn-download" onclick="downloadTxt()">💾 Simpan .txt</button>
        <button class="btn-main btn-clear" onclick="clearAll()">🗑️ Hapus</button>
    </div>
</div>

<script>
    const input = document.getElementById('inputText');
    const themeBtn = document.getElementById('themeToggle');

    // Stats Update
    input.addEventListener('input', () => {
        const val = input.value;
        document.getElementById('charCount').innerText = `${val.length} Karakter`;
        document.getElementById('wordCount').innerText = `${val.trim() ? val.trim().split(/\s+/).length : 0} Kata`;
        document.getElementById('lineCount').innerText = `${val ? val.split(/\n/).length : 0} Baris`;
    });

    // Theme Toggle
    function toggleTheme() {
        const root = document.documentElement;
        if (root.getAttribute('data-theme') === 'light') {
            root.removeAttribute('data-theme');
            themeBtn.innerText = '☀️ Light';
        } else {
            root.setAttribute('data-theme', 'light');
            themeBtn.innerText = '🌙 Dark';
        }
    }

    // Logic Functions
    function processText(type) {
        let txt = input.value;
        if (!txt && type !== 'caesar') return;

        switch(type) {
            case 'upper': txt = txt.toUpperCase(); break;
            case 'lower': txt = txt.toLowerCase(); break;
            case 'title': txt = txt.replace(/\w\S*/g, (w) => w.replace(/^\w/, (c) => c.toUpperCase())); break;
            case 'sentence': txt = txt.toLowerCase().replace(/(^\s*\w|[.!?]\s*\w)/g, c => c.toUpperCase()); break;
            case 'clean': txt = txt.replace(/\s+/g, ' ').trim(); break;
            case 'slug': txt = txt.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, ''); break;
            case 'base64': 
                try { txt = (txt === btoa(atob(txt))) ? atob(txt) : btoa(txt); } 
                catch(e) { txt = btoa(txt); } 
                break;
            case 'binary':
                if (/^[01\s]+$/.test(txt)) {
                    txt = txt.split(' ').map(bin => String.fromCharCode(parseInt(bin, 2))).join('');
                } else {
                    txt = txt.split('').map(char => char.charCodeAt(0).toString(2).padStart(8, '0')).join(' ');
                }
                break;
            case 'caesar':
                const shift = parseInt(prompt("Masukkan jumlah pergeseran (1-25):", "3")) || 0;
                txt = txt.replace(/[a-z]/gi, (c) => {
                    const start = c <= 'Z' ? 65 : 97;
                    return String.fromCharCode(((c.charCodeAt(0) - start + shift) % 26) + start);
                });
                break;
            case 'extractEmails':
                const emails = txt.match(/([a-zA-Z0-9._-]+@[a-zA-Z0-9._-]+\.[a-zA-Z0-9_-]+)/gi);
                txt = emails ? [...new Set(emails)].join('\n') : "Tidak ditemukan email.";
                break;
        }
        input.value = txt;
        input.dispatchEvent(new Event('input'));
    }

    function generatePass() {
        const chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+";
        let pass = "";
        for (let i = 0; i < 16; i++) pass += chars.charAt(Math.floor(Math.random() * chars.length));
        input.value = pass;
        input.dispatchEvent(new Event('input'));
    }

    function loremIpsum() {
        input.value = "Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat.";
        input.dispatchEvent(new Event('input'));
    }

    function downloadTxt() {
        const blob = new Blob([input.value], { type: "text/plain" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "hasil-konversi.txt";
        a.click();
    }

    function copy() {
        input.select();
        document.execCommand('copy');
        const btn = document.querySelector('.btn-copy');
        btn.innerText = "✅ Tersalin!";
        setTimeout(() => btn.innerText = "📋 Salin Teks", 2000);
    }

    function clearAll() {
        if(confirm("Hapus semua teks?")) {
            input.value = "";
            input.dispatchEvent(new Event('input'));
        }
    }

    function speak() {
        const utterance = new SpeechSynthesisUtterance(input.value);
        utterance.lang = 'id-ID';
        window.speechSynthesis.speak(utterance);
    }

    // PWA Logic
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById('installBtn').style.display = 'block';
    });

    async function installPWA() {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') document.getElementById('installBtn').style.display = 'none';
            deferredPrompt = null;
        }
    }
</script>

</body>
</html>
