<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Converter Pro v9.2 - Polished Edition</title>
    <meta name="theme-color" content="#0f172a">
    
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root {
            --bg-color: #0f172a;
            --container-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --border-color: #334155;
            --btn-bg: #1e293b;
            --btn-special: #f59e0b;
            --btn-pdf: #ef4444;
            --btn-ocr: #8b5cf6;
        }

        [data-theme="light"] {
            --bg-color: #f1f5f9;
            --container-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --border-color: #cbd5e1;
            --btn-bg: #f8fafc;
            --btn-special: #d97706;
            --btn-pdf: #dc2626;
            --btn-ocr: #7c3aed;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top left, rgba(59, 130, 246, 0.15), transparent);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        .container {
            background-color: var(--container-bg);
            width: 100%;
            max-width: 1000px;
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-color);
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .header-wrap {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        h1 {
            margin: 0;
            background: linear-gradient(135deg, #3b82f6, #ef4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.2rem;
            font-weight: 800;
        }

        .icon-btn {
            background: var(--btn-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 8px 15px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            font-weight: 600;
        }

        .icon-btn:hover { background-color: var(--border-color); }
        .icon-btn:active { transform: scale(0.95); }

        textarea {
            width: 100%;
            height: 240px;
            background-color: rgba(15, 23, 42, 0.3);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            font-size: 1.05rem;
            resize: vertical;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
            line-height: 1.6;
        }

        textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15); }

        .stats-wrap {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }

        .stats {
            display: flex;
            gap: 20px;
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
        }
        
        #saveIndicator {
            font-size: 0.8rem;
            color: #10b981;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .category-container { margin-top: 25px; }

        .category-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .category-title::after { content: ""; flex: 1; height: 1px; background: var(--border-color); }

        .button-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 10px;
        }

        button.tool-btn {
            background-color: var(--btn-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }

        button.tool-btn:hover {
            background-color: var(--accent);
            border-color: var(--accent);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        button.tool-btn:active { transform: scale(0.96); }
        button.tool-btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

        .ocr-btn { border-color: var(--btn-ocr) !important; color: var(--btn-ocr) !important; }
        .ocr-btn:hover { background: var(--btn-ocr) !important; color: white !important; }
        .special-btn { border-color: var(--btn-special) !important; color: var(--btn-special) !important; }
        .special-btn:hover { background: var(--btn-special) !important; color: white !important; }

        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid var(--border-color);
        }

        .btn-main { padding: 15px 25px; border-radius: 14px; font-weight: 700; flex: 1; border: none; cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; justify-content: center; gap: 8px;}
        .btn-main:active { transform: scale(0.96); }
        
        .btn-copy { background: var(--accent); color: white; }
        .btn-copy:hover { background: var(--accent-hover); box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.3); }
        
        .btn-pdf { background: var(--btn-pdf); color: white; }
        .btn-pdf:hover { background: #b91c1c; box-shadow: 0 10px 15px -3px rgba(239, 68, 68, 0.3); }

        .btn-clear { background: var(--container-bg); border: 2px solid var(--border-color); color: var(--text-main); flex: 0.5;}
        .btn-clear:hover { background: var(--border-color); color: #ef4444; border-color: #ef4444;}

        #imageInput { display: none; }

        @media (max-width: 768px) {
            .button-grid { grid-template-columns: 1fr 1fr; }
            .action-buttons { flex-wrap: wrap; }
            .btn-clear { flex: 100%; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-wrap">
        <h1>Text Converter <span style="font-size: 1rem; color: var(--text-muted); font-weight: 500;">v9.2</span></h1>
        <button class="icon-btn" onclick="toggleTheme()" id="themeToggle">☀️ Light Mode</button>
    </div>
    
    <textarea id="inputText" placeholder="Ketik, tempel teks, atau gunakan alat ajaib di bawah..."></textarea>
    
    <div class="stats-wrap">
        <div class="stats">
            <span id="charCount">0 Karakter</span>
            <span id="wordCount">0 Kata</span>
        </div>
        <span id="saveIndicator">✓ Tersimpan otomatis</span>
    </div>

    <input type="file" id="imageInput" accept="image/png, image/jpeg, image/jpg" onchange="runOCR(event)">

    <div class="category-container">
        <div class="category-title">🤖 AI, Suara & Terjemahan</div>
        <div class="button-grid">
            <button class="tool-btn ocr-btn" id="btnOCR" onclick="document.getElementById('imageInput').click()">📷 Ekstrak dari Foto</button>
            <button class="tool-btn special-btn" id="btnTransIDEN" onclick="translateText('id|en')">ID ➔ EN Translate</button>
            <button class="tool-btn special-btn" id="btnTransENID" onclick="translateText('en|id')">EN ➔ ID Translate</button>
            <button class="tool-btn" onclick="speakText()">🔊 Dengarkan Teks</button>
        </div>
    </div>

    <div class="category-container">
        <div class="category-title">🕵️‍♂️ Penyaring Data</div>
        <div class="button-grid">
            <button class="tool-btn" onclick="processText('extLinks')">🔗 Ambil Link</button>
            <button class="tool-btn" onclick="processText('extEmails')">📧 Ambil Email</button>
            <button class="tool-btn" onclick="processText('extHashtags')">#️⃣ Ambil Hashtag</button>
            <button class="tool-btn" onclick="processText('extNumbers')">🔢 Ambil Angka</button>
        </div>
    </div>

    <div class="category-container">
        <div class="category-title">📝 Format & Ubah Huruf</div>
        <div class="button-grid">
            <button class="tool-btn" onclick="processText('upper')">UPPERCASE</button>
            <button class="tool-btn" onclick="processText('lower')">lowercase</button>
            <button class="tool-btn" onclick="processText('title')">Title Case</button>
            <button class="tool-btn" onclick="processText('clean')">🧹 Rapikan Spasi</button>
            <button class="tool-btn" onclick="processText('removeSymbols')">🚫 Hapus Simbol</button>
        </div>
    </div>

    <div class="action-buttons">
        <button class="btn-main btn-copy" onclick="copyText()" id="btnCopy">📋 Salin Teks</button>
        <button class="btn-main btn-pdf" onclick="exportToPDF()">📄 Simpan PDF</button>
        <button class="btn-main btn-clear" onclick="clearAll()">🗑️ Hapus</button>
    </div>
</div>

<script>
    const input = document.getElementById('inputText');
    const themeBtn = document.getElementById('themeToggle');
    const saveIndicator = document.getElementById('saveIndicator');
    let saveTimeout;

    // Auto-Save Recovery
    window.onload = () => {
        const savedText = localStorage.getItem('textConverterDraft');
        if (savedText) {
            input.value = savedText;
            updateStats();
        }
    };

    // Live Stats & Auto-Save Trigger
    input.addEventListener('input', () => {
        updateStats();
        
        clearTimeout(saveTimeout);
        saveTimeout = setTimeout(() => {
            localStorage.setItem('textConverterDraft', input.value);
            saveIndicator.style.opacity = '1';
            setTimeout(() => saveIndicator.style.opacity = '0', 2000);
        }, 800);
    });

    function updateStats() {
        const val = input.value;
        document.getElementById('charCount').innerText = `${val.length} Karakter`;
        document.getElementById('wordCount').innerText = `${val.trim() ? val.trim().split(/\s+/).length : 0} Kata`;
    }

    // Theme Toggle
    function toggleTheme() {
        const root = document.documentElement;
        if (root.getAttribute('data-theme') === 'light') {
            root.removeAttribute('data-theme');
            themeBtn.innerText = '☀️ Light Mode';
        } else {
            root.setAttribute('data-theme', 'light');
            themeBtn.innerText = '🌙 Dark Mode';
        }
    }

    // Text to Speech
    function speakText() {
        if (!input.value) return;
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(input.value);
        utterance.lang = 'id-ID';
        window.speechSynthesis.speak(utterance);
    }

    // Export to PDF (Multi-page Support)
    function exportToPDF() {
        const text = input.value.trim();
        if (!text) {
            alert("Tidak ada teks untuk disimpan!");
            return;
        }
        
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        doc.setFont("helvetica", "normal");
        doc.setFontSize(12);
        
        const splitText = doc.splitTextToSize(text, 180);
        let yPos = 20;
        
        for (let i = 0; i < splitText.length; i++) {
            if (yPos > 280) { 
                doc.addPage();
                yPos = 20; 
            }
            doc.text(splitText[i], 15, yPos);
            yPos += 7; 
        }
        
        doc.save("TextConverterPro.pdf");
    }

    // OCR (Optical Character Recognition)
    function runOCR(event) {
        const file = event.target.files[0];
        if (!file) return;

        if (!navigator.onLine) {
            alert("Fitur OCR membutuhkan koneksi internet untuk mengunduh AI.");
            event.target.value = '';
            return;
        }

        const btnOCR = document.getElementById('btnOCR');
        btnOCR.disabled = true;

        Tesseract.recognize(file, 'ind+eng', { 
            logger: m => {
                if (m.status === 'recognizing text') {
                    btnOCR.innerText = `⏳ Membaca... ${Math.round(m.progress * 100)}%`;
                } else {
                    btnOCR.innerText = `⏳ Menyiapkan AI...`;
                }
            } 
        }).then(({ data: { text } }) => {
            input.value = input.value ? input.value + '\n\n' + text : text;
            input.dispatchEvent(new Event('input')); 
            btnOCR.innerText = "✅ Berhasil!";
            setTimeout(() => {
                btnOCR.innerText = "📷 Ekstrak dari Foto";
                btnOCR.disabled = false;
            }, 2000);
            event.target.value = ''; 
        }).catch(err => {
            alert("Gagal membaca gambar. Pastikan gambar jelas.");
            btnOCR.innerText = "📷 Ekstrak dari Foto";
            btnOCR.disabled = false;
            event.target.value = '';
        });
    }

    // Translate API
    async function translateText(langPair) {
        const txt = input.value.trim();
        if(!txt) return;
        
        if (!navigator.onLine) {
            alert("Koneksi internet diperlukan untuk menerjemahkan.");
            return;
        }

        const btnId = langPair === 'id|en' ? 'btnTransIDEN' : 'btnTransENID';
        const btn = document.getElementById(btnId);
        const originalText = btn.innerText;
        
        btn.innerText = "⏳ Loading...";
        btn.disabled = true;

        try {
            const response = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(txt)}&langpair=${langPair}`);
            const data = await response.json();
            if(data.responseData && data.responseData.translatedText) {
                input.value = data.responseData.translatedText;
                input.dispatchEvent(new Event('input')); 
            } else {
                alert("Gagal mendapatkan terjemahan.");
            }
        } catch (error) {
            alert("Terjadi kesalahan jaringan.");
        }
        btn.innerText = originalText;
        btn.disabled = false;
    }

    // Text Processor
    function processText(type) {
        let txt = input.value;
        if (!txt) return;

        try {
            switch(type) {
                case 'upper': txt = txt.toUpperCase(); break;
                case 'lower': txt = txt.toLowerCase(); break;
                case 'title': txt = txt.replace(/\w\S*/g, (w) => w.replace(/^\w/, (c) => c.toUpperCase())); break;
                case 'clean': txt = txt.replace(/\s+/g, ' ').trim(); break;
                case 'removeSymbols': 
                    // Menghapus segala sesuatu kecuali huruf (semua bahasa), angka, dan spasi
                    txt = txt.replace(/[^\p{L}\p{N}\s]/gu, ''); 
                    break;
                
                case 'extLinks':
                    const links = txt.match(/https?:\/\/[^\s]+/gi);
                    txt = links ? [...new Set(links)].join('\n') : "Tidak ada link ditemukan.";
                    break;
                case 'extEmails':
                    const emails = txt.match(/([a-zA-Z0-9._-]+@[a-zA-Z0-9._-]+\.[a-zA-Z0-9_-]+)/gi);
                    txt = emails ? [...new Set(emails)].join('\n') : "Tidak ada email ditemukan.";
                    break;
                case 'extHashtags':
                    const hashtags = txt.match(/#[a-zA-Z0-9_]+/gi);
                    txt = hashtags ? [...new Set(hashtags)].join('\n') : "Tidak ada hashtag ditemukan.";
                    break;
                case 'extNumbers':
                    const numbers = txt.match(/\d+/g);
                    txt = numbers ? numbers.join('\n') : "Tidak ada angka ditemukan.";
                    break;
            }
            input.value = txt;
            input.dispatchEvent(new Event('input')); 
        } catch (e) {
            alert("Terjadi kesalahan sistem.");
        }
    }

    // Salin Teks
    async function copyText() {
        const textToCopy = input.value;
        if (!textToCopy) return;
        
        const btn = document.getElementById('btnCopy');
        
        try {
            await navigator.clipboard.writeText(textToCopy);
            btn.innerHTML = "✅ Tersalin!";
        } catch (err) {
            input.select();
            document.execCommand('copy');
            btn.innerHTML = "✅ Tersalin!";
        }

        setTimeout(() => btn.innerHTML = "📋 Salin Teks", 2000);
    }

    function clearAll() {
        if(confirm("Apakah Anda yakin ingin menghapus semua teks?")) {
            input.value = "";
            localStorage.removeItem('textConverterDraft'); 
            updateStats();
            window.speechSynthesis.cancel();
        }
    }
</script>

</body>
</html>
