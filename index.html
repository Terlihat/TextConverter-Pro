<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Converter Pro v8.0 - Vision Edition</title>
    <meta name="theme-color" content="#0f172a">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

    <style>
        :root {
            --bg-color: #0f172a;
            --container-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --border-color: #334155;
            --btn-bg: #1e293b;
            --btn-special: #f59e0b;
            --btn-dev: #10b981;
            --btn-extract: #ec4899;
            --btn-ocr: #8b5cf6;
        }

        [data-theme="light"] {
            --bg-color: #f1f5f9;
            --container-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --border-color: #cbd5e1;
            --btn-bg: #f8fafc;
            --btn-special: #d97706;
            --btn-dev: #059669;
            --btn-extract: #db2777;
            --btn-ocr: #7c3aed;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top right, rgba(139, 92, 246, 0.15), transparent);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        .container {
            background-color: var(--container-bg);
            width: 100%;
            max-width: 1000px;
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
        }

        .header-wrap {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        h1 {
            margin: 0;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.2rem;
            font-weight: 800;
        }

        .icon-btn {
            background: var(--btn-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 8px 15px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.3s;
            font-weight: 600;
        }

        .icon-btn:hover { background-color: var(--border-color); }

        textarea {
            width: 100%;
            height: 220px;
            background-color: rgba(15, 23, 42, 0.3);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            font-size: 1.05rem;
            resize: vertical;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
            line-height: 1.6;
        }

        textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }

        .stats {
            display: flex;
            justify-content: flex-start;
            gap: 20px;
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
            margin-top: 10px;
        }

        .category-container { margin-top: 25px; }

        .category-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .category-title::after { content: ""; flex: 1; height: 1px; background: var(--border-color); }

        .button-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 10px;
        }

        button.tool-btn {
            background-color: var(--btn-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        button.tool-btn:hover {
            background-color: var(--accent);
            border-color: var(--accent);
            color: white;
            transform: translateY(-2px);
        }
        
        button.tool-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .ocr-btn { border-color: var(--btn-ocr) !important; color: var(--btn-ocr) !important; background: rgba(139, 92, 246, 0.05) !important; }
        .ocr-btn:hover { background: var(--btn-ocr) !important; color: white !important; }

        .extract-btn { border-color: var(--btn-extract) !important; color: var(--btn-extract) !important; }
        .extract-btn:hover { background: var(--btn-extract) !important; color: white !important; }
        
        .special-btn { border-color: var(--btn-special) !important; color: var(--btn-special) !important; }
        .special-btn:hover { background: var(--btn-special) !important; color: white !important; }

        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid var(--border-color);
        }

        .btn-main { padding: 15px 25px; border-radius: 14px; font-weight: 700; flex: 1; border: none; cursor: pointer; transition: 0.3s; }
        .btn-copy { background: var(--accent); color: white; }
        .btn-copy:hover { background: var(--accent-hover); }
        .btn-clear { background: #ef4444; color: white; flex: 0.3; }

        /* Sembunyikan input file asli */
        #imageInput { display: none; }

        @media (max-width: 768px) {
            .button-grid { grid-template-columns: 1fr 1fr; }
            .action-buttons { flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-wrap">
        <h1>Text Converter <span style="font-size: 1rem; color: var(--text-muted);">v8.0 Vision</span></h1>
        <button class="icon-btn" onclick="toggleTheme()" id="themeToggle">☀️ Light Mode</button>
    </div>
    
    <textarea id="inputText" placeholder="Ketik, tempel teks, atau gunakan fitur OCR dari gambar..."></textarea>
    
    <div class="stats">
        <span id="charCount">0 Karakter</span>
        <span id="wordCount">0 Kata</span>
    </div>

    <input type="file" id="imageInput" accept="image/png, image/jpeg, image/jpg" onchange="runOCR(event)">

    <div class="category-container">
        <div class="category-title">🤖 AI & Vision Tools</div>
        <div class="button-grid">
            <button class="tool-btn ocr-btn" id="btnOCR" onclick="document.getElementById('imageInput').click()">📷 Ekstrak Teks (OCR)</button>
            <button class="tool-btn special-btn" id="btnTransIDEN" onclick="translateText('id|en')">🇮🇩 ➔ 🇬🇧 Translate</button>
            <button class="tool-btn special-btn" id="btnTransENID" onclick="translateText('en|id')">🇬🇧 ➔ 🇮🇩 Translate</button>
        </div>
    </div>

    <div class="category-container">
        <div class="category-title">🕵️‍♂️ Data Extractor</div>
        <div class="button-grid">
            <button class="tool-btn extract-btn" onclick="processText('extLinks')">🔗 Ambil Link</button>
            <button class="tool-btn extract-btn" onclick="processText('extEmails')">📧 Ambil Email</button>
            <button class="tool-btn extract-btn" onclick="processText('extHashtags')">#️⃣ Ambil Hashtag</button>
            <button class="tool-btn extract-btn" onclick="processText('extNumbers')">🔢 Ambil Angka</button>
        </div>
    </div>

    <div class="category-container">
        <div class="category-title">📝 Format & Ubah Huruf</div>
        <div class="button-grid">
            <button class="tool-btn" onclick="processText('upper')">UPPERCASE</button>
            <button class="tool-btn" onclick="processText('lower')">lowercase</button>
            <button class="tool-btn" onclick="processText('title')">Title Case</button>
            <button class="tool-btn" onclick="processText('clean')">🧹 Hapus Spasi</button>
        </div>
    </div>

    <div class="action-buttons">
        <button class="btn-main btn-copy" onclick="copy()">📋 Salin Teks</button>
        <button class="btn-main btn-clear" onclick="clearAll()">🗑️ Kosongkan</button>
    </div>
</div>

<script>
    const input = document.getElementById('inputText');
    const themeBtn = document.getElementById('themeToggle');

    // Update Stats
    input.addEventListener('input', updateStats);
    
    function updateStats() {
        const val = input.value;
        document.getElementById('charCount').innerText = `${val.length} Karakter`;
        document.getElementById('wordCount').innerText = `${val.trim() ? val.trim().split(/\s+/).length : 0} Kata`;
    }

    // Theme Toggle
    function toggleTheme() {
        const root = document.documentElement;
        if (root.getAttribute('data-theme') === 'light') {
            root.removeAttribute('data-theme');
            themeBtn.innerText = '☀️ Light Mode';
        } else {
            root.setAttribute('data-theme', 'light');
            themeBtn.innerText = '🌙 Dark Mode';
        }
    }

    // Fitur OCR (Optical Character Recognition)
    function runOCR(event) {
        const file = event.target.files[0];
        if (!file) return;

        const btnOCR = document.getElementById('btnOCR');
        btnOCR.disabled = true;

        // Proses membaca gambar menggunakan Tesseract.js
        Tesseract.recognize(
            file,
            'ind+eng', // Membaca Bahasa Indonesia & Inggris
            { 
                logger: m => {
                    if (m.status === 'recognizing text') {
                        // Update progress bar pada tombol
                        const progress = Math.round(m.progress * 100);
                        btnOCR.innerText = `⏳ Membaca... ${progress}%`;
                    } else {
                        btnOCR.innerText = `⏳ Menyiapkan AI...`;
                    }
                } 
            }
        ).then(({ data: { text } }) => {
            // Gabungkan teks baru dengan teks yang sudah ada (jika ada)
            input.value = input.value ? input.value + '\n\n' + text : text;
            updateStats();
            
            // Kembalikan kondisi tombol
            btnOCR.innerText = "✅ Selesai!";
            setTimeout(() => {
                btnOCR.innerText = "📷 Ekstrak Teks (OCR)";
                btnOCR.disabled = false;
            }, 2000);
            
            // Reset input file agar bisa memilih gambar yang sama lagi
            event.target.value = ''; 
            
        }).catch(err => {
            alert("Gagal mengekstrak teks. Pastikan gambar cukup jelas.");
            btnOCR.innerText = "📷 Ekstrak Teks (OCR)";
            btnOCR.disabled = false;
            event.target.value = '';
        });
    }

    // Live Translator via MyMemory API
    async function translateText(langPair) {
        const txt = input.value.trim();
        if(!txt) return;
        
        const btnId = langPair === 'id|en' ? 'btnTransIDEN' : 'btnTransENID';
        const btn = document.getElementById(btnId);
        const originalText = btn.innerText;
        
        btn.innerText = "⏳ Loading...";
        btn.disabled = true;

        try {
            const response = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(txt)}&langpair=${langPair}`);
            const data = await response.json();
            
            if(data.responseData && data.responseData.translatedText) {
                input.value = data.responseData.translatedText;
                updateStats();
            } else {
                alert("Gagal mendapatkan terjemahan.");
            }
        } catch (error) {
            alert("Pastikan Anda terhubung ke internet untuk menerjemahkan.");
        }

        btn.innerText = originalText;
        btn.disabled = false;
    }

    // Extractor & Formatter
    function processText(type) {
        let txt = input.value;
        if (!txt) return;

        try {
            switch(type) {
                case 'upper': txt = txt.toUpperCase(); break;
                case 'lower': txt = txt.toLowerCase(); break;
                case 'title': txt = txt.replace(/\w\S*/g, (w) => w.replace(/^\w/, (c) => c.toUpperCase())); break;
                case 'clean': txt = txt.replace(/\s+/g, ' ').trim(); break;
                
                case 'extLinks':
                    const links = txt.match(/https?:\/\/[^\s]+/gi);
                    txt = links ? [...new Set(links)].join('\n') : "Tidak ada link yang ditemukan.";
                    break;
                case 'extEmails':
                    const emails = txt.match(/([a-zA-Z0-9._-]+@[a-zA-Z0-9._-]+\.[a-zA-Z0-9_-]+)/gi);
                    txt = emails ? [...new Set(emails)].join('\n') : "Tidak ada email yang ditemukan.";
                    break;
                case 'extHashtags':
                    const hashtags = txt.match(/#[a-zA-Z0-9_]+/gi);
                    txt = hashtags ? [...new Set(hashtags)].join('\n') : "Tidak ada hashtag yang ditemukan.";
                    break;
                case 'extNumbers':
                    const numbers = txt.match(/\d+/g);
                    txt = numbers ? numbers.join('\n') : "Tidak ada angka yang ditemukan.";
                    break;
            }
            input.value = txt;
            updateStats();
        } catch (e) {
            alert("Operasi gagal.");
        }
    }

    function copy() {
        if (!input.value) return;
        input.select();
        document.execCommand('copy');
        const btn = document.querySelector('.btn-copy');
        btn.innerText = "✅ Tersalin!";
        setTimeout(() => btn.innerText = "📋 Salin Teks", 2000);
    }

    function clearAll() {
        input.value = "";
        updateStats();
    }
</script>

</body>
</html>
